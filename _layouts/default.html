<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/css/styles.css' | relative_url }}">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VPLR0328FN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-VPLR0328FN');
  </script>
</head>

<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Sticky Header -->
  <header class="header" role="banner">
    <div class="container">
      <div class="header__inner">
        <a href="{{ '/' | relative_url }}" class="header__logo" aria-label="Laer Innovation Inc. — Home">
          Laer <span class="logo-word">Innovation</span>
        </a>
        <nav class="header__nav" aria-label="Primary navigation">
          <a href="#about">About</a>
          <a href="#services">Services</a>
          <a href="#contact">Contact</a>
          <a href="#contact" class="header__cta">Get in Touch</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Page Content -->
  <main id="main-content">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer__inner">
        <p class="footer__brand">Laer <span>Innovation</span> Inc.</p>
        <p class="footer__copy">&copy; {{ site.time | date: '%Y' }} Laer Innovation Inc. All rights reserved.</p>
      </div>
    </div>
  </footer>

</body>

</html>
